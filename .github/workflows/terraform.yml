name: Terraform - InfraMonitor

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: 1.9.0
  TF_WORKING_DIR: infra

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: [self-hosted, azure, uksouth]
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          

      # Never blocks the pipeline - a formatting nit shouldn't stop a plan from being visible.
      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_client_id: ${{ secrets.ARM_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_current_user_object_id: ${{ secrets.TF_VAR_current_user_object_id }}
          TF_VAR_publisher_email: ${{ vars.TF_VAR_PUBLISHER_EMAIL }}
          TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
          TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
          TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
          TF_VAR_create_apim: ${{ vars.TF_VAR_CREATE_APIM }}
          TF_VAR_keyvault_allowed_ip_ranges: ${{ vars.TF_VAR_KEYVAULT_ALLOWED_IP_RANGES }}
          TF_VAR_cosmos_allowed_ip_ranges: ${{ vars.TF_VAR_COSMOS_ALLOWED_IP_RANGES }}
          TF_VAR_runner_ssh_public_key: ${{ secrets.TF_VAR_RUNNER_SSH_PUBLIC_KEY }}

      - name: Save plan output as text
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -no-color tfplan > plan.txt

      - name: Post plan output as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const path = require('path')

            const maxLength = 65000
            let output = fs.readFileSync(path.join('${{ env.TF_WORKING_DIR }}', 'plan.txt'), 'utf8')
            let truncated = false
            if (output.length > maxLength) {
              output = output.substring(0, maxLength)
              truncated = true
            }

            const body = [
              '## Terraform Plan Output',
              '```',
              output,
              '```',
              truncated ? '\n_Plan output truncated - see full output in Actions logs_' : '',
            ].join('\n')

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    # Never on pull_request, and only when the ref is main - covers both an automatic push to
    # main and a manual workflow_dispatch run targeting main. 
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, azure, uksouth]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"

      - name: Download tfplan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_client_id: ${{ secrets.ARM_CLIENT_ID }}
          TF_VAR_tenant_id: ${{ secrets.ARM_TENANT_ID }}
          TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          TF_VAR_current_user_object_id: ${{ secrets.TF_VAR_current_user_object_id }}
          TF_VAR_publisher_email: ${{ vars.TF_VAR_PUBLISHER_EMAIL }}
          TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
          TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
          TF_VAR_project: ${{ vars.TF_VAR_PROJECT }}
          TF_VAR_create_apim: ${{ vars.TF_VAR_CREATE_APIM }}
          TF_VAR_keyvault_allowed_ip_ranges: ${{ vars.TF_VAR_KEYVAULT_ALLOWED_IP_RANGES }}
          TF_VAR_cosmos_allowed_ip_ranges: ${{ vars.TF_VAR_COSMOS_ALLOWED_IP_RANGES }}

      - name: Terraform Output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
